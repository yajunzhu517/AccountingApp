name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 12.0
        
    - name: Environment Diagnostics
      run: |
        echo "=== Java Version ==="
        java -version || true
        echo "=== ANDROID_HOME ==="
        echo "$ANDROID_HOME" || true
        echo "=== Listing Android SDK ==="
        ls -la "$ANDROID_HOME" 2>/dev/null || true
        echo "=== Gradle Wrapper Version ==="
        ./gradlew --version || true
        echo "=== Listing files in project root ==="
        ls -la
        echo "=== Checking gradlew permissions ==="
        ls -la gradlew
      
    - name: Make gradlew executable
      run: chmod +x gradlew
      
    - name: Build Debug APK
      id: build
      run: |
        ./gradlew assembleDebug --stacktrace --info 2>&1 | tee gradle-build.log
        BUILD_EXIT_CODE=${PIPESTATUS[0]}
        echo "build_exit_code=$BUILD_EXIT_CODE" >> $GITHUB_OUTPUT
        echo "Build exit code: $BUILD_EXIT_CODE"
      continue-on-error: true
      
    - name: Find and list APK files
      run: |
        echo "=== Searching for APK files ==="
        find app/build -name "*.apk" -type f 2>/dev/null || true
        echo "=== Listing outputs directory ==="
        ls -la app/build/outputs/ 2>/dev/null || true
        echo "=== Listing apk directory ==="
        ls -la app/build/outputs/apk/ 2>/dev/null || true
        echo "=== Listing debug directory ==="
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || true
        echo "=== Gradle build log tail (last 100 lines) ==="
        tail -100 gradle-build.log 2>/dev/null || true
      
    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: gradle-build.log
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: steps.build.outputs.build_exit_code == '0'
      with:
        name: app-debug
        path: app/build/outputs/apk/**/*.apk
        if-no-files-found: error
        
    - name: Fail if build failed
      if: steps.build.outputs.build_exit_code != '0'
      run: |
        echo "Build failed with exit code ${{ steps.build.outputs.build_exit_code }}"
        exit 1