name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 12.0
        
    - name: Make gradlew executable
      run: chmod +x gradlew
      
    - name: Build Debug APK with Build Scan
      id: build
      run: |
        ./gradlew assembleDebug --scan 2>&1 | tee gradle-build.log
        BUILD_EXIT_CODE=${PIPESTATUS[0]}
        echo "build_exit_code=$BUILD_EXIT_CODE" >> $GITHUB_OUTPUT
        echo "Build exit code: $BUILD_EXIT_CODE"
        # Extract build scan URL if present
        grep -oP 'https://gradle.com/s/\w+' gradle-build.log | tail -1 > build-scan-url.txt || true
        if [ -s build-scan-url.txt ]; then
          echo "build_scan_url=$(cat build-scan-url.txt)" >> $GITHUB_OUTPUT
        fi
      continue-on-error: true
      
    - name: Output Build Scan URL
      if: steps.build.outputs.build_scan_url != ''
      run: |
        echo "## Gradle Build Scan 🔍" >> $GITHUB_STEP_SUMMARY
        echo "Build Scan URL: ${{ steps.build.outputs.build_scan_url }}" >> $GITHUB_STEP_SUMMARY
      
    - name: Output build summary
      if: steps.build.outputs.build_exit_code != '0'
      run: |
        echo "## Build Failed ❌" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Gradle Build Log (last 100 lines)" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        tail -100 gradle-build.log >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
      
    - name: Find and list APK files
      run: |
        echo "=== Searching for APK files ==="
        find app/build -name "*.apk" -type f 2>/dev/null || true
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || true
      
    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: gradle-build.log
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: steps.build.outputs.build_exit_code == '0'
      with:
        name: app-debug
        path: app/build/outputs/apk/**/*.apk
        if-no-files-found: error
        
    - name: Fail if build failed
      if: steps.build.outputs.build_exit_code != '0'
      run: |
        echo "Build failed with exit code ${{ steps.build.outputs.build_exit_code }}"
        exit 1