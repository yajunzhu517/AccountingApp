name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 12.0
        
    - name: Make gradlew executable
      run: chmod +x gradlew
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
      
    - name: Find and list APK files
      run: |
        echo "=== Searching for APK files ==="
        find app/build -name "*.apk" -type f 2>/dev/null || true
        echo "=== Listing outputs directory ==="
        ls -la app/build/outputs/ 2>/dev/null || true
        echo "=== Listing apk directory ==="
        ls -la app/build/outputs/apk/ 2>/dev/null || true
        echo "=== Listing debug directory ==="
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || true
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/**/*.apk
        if-no-files-found: error