name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 12.0
        
    - name: Make gradlew executable
      run: chmod +x gradlew
      
    - name: Build Debug APK
      id: build
      run: |
        ./gradlew assembleDebug --stacktrace --info 2>&1 | tee gradle-build.log
        BUILD_EXIT_CODE=${PIPESTATUS[0]}
        echo "build_exit_code=$BUILD_EXIT_CODE" >> $GITHUB_OUTPUT
        echo "Build exit code: $BUILD_EXIT_CODE"
      continue-on-error: true
      
    - name: Output build log to GitHub Actions log
      if: steps.build.outputs.build_exit_code != '0'
      run: |
        echo "========================================"
        echo "BUILD FAILED - LAST 150 LINES OF LOG"
        echo "========================================"
        tail -150 gradle-build.log
        echo "========================================"
        echo "ERROR SUMMARY"
        echo "========================================"
        grep -E "ERROR|error:|Exception|FAILED|Cannot|cannot|fatal" gradle-build.log | tail -30
      
    - name: Post build log to GitHub Issue
      if: steps.build.outputs.build_exit_code != '0'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const logContent = fs.readFileSync('gradle-build.log', 'utf8');
          const lastLines = logContent.split('\n').slice(-200).join('\n');
          const errorLines = logContent.split('\n').filter(line => 
            /ERROR|error:|Exception|FAILED|Cannot|cannot|fatal/i.test(line)
          ).slice(-30).join('\n');
          
          const body = `## Build Failed ❌\n\n**Run:** ${context.runId}\n**Job:** ${context.job}\n\n### Last 200 Lines of Build Log\n\n\`\`\`\n${lastLines}\n\`\`\`\n\n### Error Summary\n\n\`\`\`\n${errorLines}\n\`\`\`\n`;
          
          github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: 1,
            body: body
          });
      
    - name: Find and list APK files
      run: |
        echo "=== Searching for APK files ==="
        find app/build -name "*.apk" -type f 2>/dev/null || true
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || true
      
    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: gradle-build.log
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: steps.build.outputs.build_exit_code == '0'
      with:
        name: app-debug
        path: app/build/outputs/apk/**/*.apk
        if-no-files-found: error
        
    - name: Fail if build failed
      if: steps.build.outputs.build_exit_code != '0'
      run: |
        echo "Build failed with exit code ${{ steps.build.outputs.build_exit_code }}"
        exit 1